<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>khlawde :: audio</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				background: #0a0a0a;
				color: #00ff41;
				font-family: 'Courier New', Courier, monospace;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				padding: 2rem;
			}
			.terminal {
				border: 1px solid #00ff41;
				padding: 2rem;
				max-width: 640px;
				width: 100%;
			}
			.title {
				font-size: 1.1rem;
				font-weight: bold;
				margin-bottom: 1.5rem;
				color: #00ffff;
				letter-spacing: 0.1em;
			}
			.status {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border: 1px solid currentColor;
				min-height: 3rem;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}
			.status.waiting {
				color: #ffff00;
				border-color: #ffff00;
			}
			.status.connected {
				color: #00ff41;
				border-color: #00ff41;
			}
			.status.playing {
				color: #00ffff;
				border-color: #00ffff;
			}
			.status.error {
				color: #ff4141;
				border-color: #ff4141;
			}
			.code {
				color: #888;
				margin-bottom: 1rem;
				font-size: 0.85rem;
			}
			.hint {
				color: #555;
				font-size: 0.8rem;
				margin-top: 1rem;
			}
			.log {
				border-top: 1px solid #222;
				margin-top: 1.5rem;
				padding-top: 1rem;
				color: #444;
				font-size: 0.78rem;
				max-height: 160px;
				overflow-y: auto;
			}
			.log-entry {
				margin-bottom: 0.2rem;
			}
			.blink {
				animation: blink 1s step-end infinite;
			}
			@keyframes blink {
				50% {
					opacity: 0;
				}
			}

			/* Autoplay unblock overlay — shown immediately on load */
			#autoplay-overlay {
				display: flex;
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.85);
				align-items: center;
				justify-content: center;
				z-index: 10;
			}
			#autoplay-overlay button {
				background: #0a0a0a;
				color: #00ff41;
				border: 1px solid #00ff41;
				font-family: inherit;
				font-size: 1rem;
				padding: 1rem 2.5rem;
				cursor: pointer;
				letter-spacing: 0.05em;
			}
			#autoplay-overlay button:hover {
				background: #00ff41;
				color: #0a0a0a;
			}

			/* Camera capture overlay */
			#camera-section {
				display: none;
				margin-top: 1.5rem;
				border-top: 1px solid #333;
				padding-top: 1rem;
			}
			#camera-section.active {
				display: block;
			}
			#camera-btn {
				background: #0a0a0a;
				color: #ff6600;
				border: 1px solid #ff6600;
				font-family: inherit;
				font-size: 0.9rem;
				padding: 0.75rem 2rem;
				cursor: pointer;
				letter-spacing: 0.05em;
				margin-bottom: 0.75rem;
			}
			#camera-btn:hover {
				background: #ff6600;
				color: #0a0a0a;
			}
			#camera-btn:disabled {
				opacity: 0.4;
				cursor: default;
			}
			#camera-status {
				font-size: 0.8rem;
				color: #ff6600;
				margin-top: 0.5rem;
			}
			#camera-preview {
				display: none;
				margin-top: 0.5rem;
				font-size: 0.4rem;
				line-height: 0.45rem;
				letter-spacing: 0;
				color: #00ff41;
				white-space: pre;
				font-family: monospace;
				overflow: hidden;
			}
			#camera-preview.active {
				display: block;
			}

			/* Music volume indicator */
			.vol-bar {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				margin-top: 0.75rem;
				font-size: 0.75rem;
				color: #333;
			}
			.vol-track {
				flex: 1;
				height: 3px;
				background: #1a1a1a;
				position: relative;
			}
			.vol-fill {
				height: 100%;
				background: #00ff41;
				width: 100%;
				transition: width 0.1s linear;
			}
		</style>
	</head>
	<body>
		<div id="autoplay-overlay">
			<button id="enable-btn">&#9654; Click to enable audio</button>
		</div>

		<div class="terminal">
			<div class="title">[ KHLAWDE :: AUDIO STREAM ]</div>

			<div class="status waiting" id="status">
				<span class="blink">&#9646;</span>&nbsp;Connecting to server...
			</div>

			<div class="code" id="code-display"></div>

			<div class="vol-bar">
				<span>&#9836; music</span>
				<div class="vol-track"><div class="vol-fill" id="vol-fill"></div></div>
			</div>

			<div class="hint" id="hint"></div>

			<div id="camera-section">
				<div style="color: #ff6600; font-weight: bold; margin-bottom: 0.75rem">
					[ CAMERA REQUESTED ]
				</div>
				<div style="color: #888; font-size: 0.8rem; margin-bottom: 0.75rem">
					The game needs your camera for a photo. Click below to enable it.
				</div>
				<button id="camera-btn">&#128247; Enable Camera</button>
				<div id="camera-status"></div>
				<div id="camera-preview"></div>
			</div>

			<div class="log" id="log"></div>
		</div>

		<!-- Hidden audio elements — routed through Web Audio API -->
		<audio id="music" loop crossorigin="anonymous"></audio>
		<audio id="tts"></audio>

		<script>
			const params = new URLSearchParams(location.search);
			const code = params.get('code');
			const statusEl = document.getElementById('status');
			const logEl = document.getElementById('log');
			const codeEl = document.getElementById('code-display');
			const hintEl = document.getElementById('hint');
			const volFill = document.getElementById('vol-fill');
			const musicEl = document.getElementById('music');
			const ttsEl = document.getElementById('tts');

			if (code) {
				codeEl.textContent = 'session: ' + code;
			} else {
				setStatus(
					'error',
					'&times; No session code. Open this URL from the SSH terminal.',
				);
			}

			// ── Logging ──────────────────────────────────────────────────────────────────
			function log(msg) {
				const e = document.createElement('div');
				e.className = 'log-entry';
				e.textContent = new Date().toLocaleTimeString() + ' ' + msg;
				logEl.prepend(e);
				while (logEl.children.length > 30) logEl.removeChild(logEl.lastChild);
			}

			function setStatus(cls, html) {
				statusEl.className = 'status ' + cls;
				statusEl.innerHTML = html;
			}

			// ── Web Audio API setup ───────────────────────────────────────────────────────
			const AC = window.AudioContext || window.webkitAudioContext;
			let audioCtx = null;
			let musicGain = null;
			let audioReady = false;
			let audioUnlocked = false; // true after user gesture
			let sessionReady = false; // true after SSH session links
			let globalWs = null; // kept so enableAudio() can notify the server

			function notifyAudioUnlocked() {
				if (globalWs && globalWs.readyState === 1) {
					globalWs.send(JSON.stringify({type: 'audio_unlocked'}));
				}
			}

			// Must be called inside a user-gesture handler (click/touch) for Safari compat
			function initAudio() {
				if (audioReady) return;
				audioReady = true;

				audioCtx = new AC();

				// Music: element -> gain -> output
				const musicSrc = audioCtx.createMediaElementSource(musicEl);
				musicGain = audioCtx.createGain();
				musicGain.gain.value = 1;
				musicSrc.connect(musicGain);
				musicGain.connect(audioCtx.destination);

				// TTS: element -> gain -> output
				const ttsSrc = audioCtx.createMediaElementSource(ttsEl);
				const ttsGain = audioCtx.createGain();
				ttsGain.gain.value = 5;
				ttsSrc.connect(ttsGain);
				ttsGain.connect(audioCtx.destination);

				// Mirror music gain value onto the volume bar every ~80 ms
				setInterval(() => {
					if (musicGain) {
						volFill.style.width = (musicGain.gain.value * 100).toFixed(1) + '%';
					}
				}, 80);
			}

			function doStartMusic() {
				if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
				musicEl.src = '/assets/music.mp3';
				musicEl.play().catch(err => log('music error: ' + err.message));
			}

			function duck() {
				if (!audioCtx || !musicGain) return;
				const t = audioCtx.currentTime;
				musicGain.gain.cancelScheduledValues(t);
				musicGain.gain.setValueAtTime(musicGain.gain.value, t);
				// Exponential ramp — sounds more natural than linear
				musicGain.gain.exponentialRampToValueAtTime(0.1, t + 0.35);
			}

			function unduck() {
				if (!audioCtx || !musicGain) return;
				const t = audioCtx.currentTime;
				musicGain.gain.cancelScheduledValues(t);
				musicGain.gain.setValueAtTime(musicGain.gain.value, t);
				musicGain.gain.exponentialRampToValueAtTime(1.0, t + 0.8);
			}

			// ── Music playback ────────────────────────────────────────────────────────────
			function startMusic() {
				// Called when SSH session links. Wait for user click if not yet unlocked.
				sessionReady = true;
				if (audioUnlocked) doStartMusic();
				// else: overlay is already visible; enableAudio() will call doStartMusic()
			}

			function enableAudio() {
				document.getElementById('autoplay-overlay').style.display = 'none';
				initAudio(); // create AudioContext inside user-gesture (required by Safari)
				audioCtx.resume();
				audioUnlocked = true;
				log('audio unlocked');
				notifyAudioUnlocked();
				if (sessionReady) doStartMusic();
				// Drain any TTS that arrived before the click
				if (!ttsPlaying && ttsQueue.length > 0) playNext();
			}

			document
				.getElementById('enable-btn')
				.addEventListener('click', enableAudio);

			// ── TTS queue ─────────────────────────────────────────────────────────────────
			const ttsQueue = [];
			let ttsPlaying = false;

			function playNext() {
				if (ttsQueue.length === 0) {
					ttsPlaying = false;
					unduck();
					setStatus(
						'connected',
						'&#9679;&nbsp;Ready &mdash; listening for Claude...',
					);
					return;
				}
				ttsPlaying = true;
				const proxyUrl = ttsQueue.shift();
				ttsEl.src = proxyUrl;
				ttsEl.load();
				ttsEl.play().catch(err => {
					log('tts play error: ' + err.message);
					playNext();
				});
			}

			function enqueueTTS(proxyUrl) {
				ttsQueue.push(proxyUrl);
				if (!ttsPlaying && audioUnlocked) playNext();
			}

			// ── TTS events ────────────────────────────────────────────────────────────────
			ttsEl.addEventListener('loadstart', () =>
				log('tts loadstart src=' + ttsEl.src),
			);
			ttsEl.addEventListener('canplay', () => log('tts canplay (codec ok)'));
			ttsEl.addEventListener('play', () => {
				duck();
				setStatus('playing', '&#9654;&nbsp;Khlawde is speaking...');
				log('tts playing');
			});
			ttsEl.addEventListener('ended', playNext);
			ttsEl.addEventListener('stalled', () => log('tts stalled'));
			ttsEl.addEventListener('error', () => {
				const e = ttsEl.error;
				log(
					'tts element error code=' +
						(e ? e.code : '?') +
						' msg=' +
						(e ? e.message : '?'),
				);
				playNext();
			});

			// ── WebSocket ─────────────────────────────────────────────────────────────────
			function connect() {
				if (!code) return;
				const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
				const ws = new WebSocket(
					proto + '//' + location.host + '/ws?code=' + code,
				);
				globalWs = ws;

				ws.onopen = () => {
					log('WebSocket open');
					setStatus(
						'waiting',
						'<span class="blink">&#9646;</span>&nbsp;Connected &mdash; waiting for SSH session...',
					);
					hintEl.textContent =
						'Keep this tab open and SSH in using the code above.';
					// If user already clicked Enable Audio before WS connected, notify now
					if (audioUnlocked) notifyAudioUnlocked();
				};

				ws.onmessage = e => {
					try {
						const msg = JSON.parse(e.data);
						if (msg.type === 'ready') {
							setStatus(
								'connected',
								'&#9679;&nbsp;Ready &mdash; listening for Khlawde...',
							);
							hintEl.textContent =
								'Audio will play automatically when Khlawde speaks.';
							log('SSH session linked — starting music');
							startMusic();
						} else if (msg.type === 'tts') {
							const text = decodeURIComponent(
								msg.url.split('text=')[1] || '',
							).slice(0, 60);
							log(
								'TTS queued: ' +
									text +
									' (queue len: ' +
									(ttsQueue.length + 1) +
									')',
							);
							enqueueTTS('/tts-proxy?url=' + encodeURIComponent(msg.url));
						} else if (msg.type === 'camera_request') {
							showCameraRequest();
						} else if (msg.type === 'camera_stop') {
							hideCameraSection();
						}
					} catch (err) {
						log('parse error: ' + err.message);
					}
				};

				ws.onclose = e => {
					if (globalWs === ws) globalWs = null;
					if (e.code === 4004) {
						setStatus('error', '&times; Invalid or expired session code.');
						hintEl.textContent = 'Start a new SSH session to get a fresh code.';
						return;
					}
					log('Closed (' + e.code + '). Reconnecting in 3s...');
					setStatus(
						'waiting',
						'<span class="blink">&#9646;</span>&nbsp;Reconnecting...',
					);
					setTimeout(connect, 3000);
				};

				ws.onerror = () => log('WebSocket error');
			}

			if (code) connect();

			// ── Camera capture ─────────────────────────────────────────────────────────────────────

			const CAM_W = 100;
			const CAM_H = 40;
			const ASCII_CHARS = ' .,:+*#%@';

			const cameraSec = document.getElementById('camera-section');
			const cameraBtn = document.getElementById('camera-btn');
			const cameraStatus = document.getElementById('camera-status');
			const cameraPreview = document.getElementById('camera-preview');

			let cameraStream = null;
			let cameraInterval = null;
			let cameraCanvas = null;
			let cameraCtx = null;
			let cameraVideo = null;

			function showCameraRequest() {
				cameraSec.classList.add('active');
				cameraStatus.textContent = 'Waiting for you to enable camera...';
				log('camera requested by game');
			}

			function hideCameraSection() {
				cameraSec.classList.remove('active');
				stopCamera();
			}

			function stopCamera() {
				if (cameraInterval) {
					clearInterval(cameraInterval);
					cameraInterval = null;
				}
				if (cameraStream) {
					cameraStream.getTracks().forEach(t => t.stop());
					cameraStream = null;
				}
				if (cameraVideo) {
					cameraVideo.remove();
					cameraVideo = null;
				}
				cameraPreview.classList.remove('active');
				cameraPreview.textContent = '';
			}

			function rgbToAscii(imageData) {
				const data = imageData.data; // RGBA
				const lines = [];
				for (let y = 0; y < CAM_H; y++) {
					let row = '';
					for (let x = 0; x < CAM_W; x++) {
						// Mirror horizontally for selfie view
						const mx = CAM_W - 1 - x;
						const i = (y * CAM_W + mx) * 4;
						const luma =
							0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
						row +=
							ASCII_CHARS[
								Math.min(
									Math.floor((luma / 255) * ASCII_CHARS.length),
									ASCII_CHARS.length - 1,
								)
							];
					}
					lines.push(row);
				}
				return lines.join('\n');
			}

			function captureAndSend() {
				if (
					!cameraVideo ||
					!cameraCtx ||
					!globalWs ||
					globalWs.readyState !== 1
				)
					return;
				cameraCtx.drawImage(cameraVideo, 0, 0, CAM_W, CAM_H);
				const imageData = cameraCtx.getImageData(0, 0, CAM_W, CAM_H);
				const ascii = rgbToAscii(imageData);
				cameraPreview.textContent = ascii;
				globalWs.send(JSON.stringify({type: 'camera_frame', frame: ascii}));
			}

			async function enableCamera() {
				cameraBtn.disabled = true;
				cameraStatus.textContent = 'Requesting camera access...';
				log('requesting getUserMedia');

				try {
					cameraStream = await navigator.mediaDevices.getUserMedia({
						video: {
							width: {ideal: 320},
							height: {ideal: 240},
							facingMode: 'user',
						},
						audio: false,
					});

					// Hidden video element to source frames from
					cameraVideo = document.createElement('video');
					cameraVideo.srcObject = cameraStream;
					cameraVideo.setAttribute('playsinline', 'true');
					cameraVideo.style.display = 'none';
					document.body.appendChild(cameraVideo);
					await cameraVideo.play();

					// Offscreen canvas for pixel extraction
					cameraCanvas = document.createElement('canvas');
					cameraCanvas.width = CAM_W;
					cameraCanvas.height = CAM_H;
					cameraCtx = cameraCanvas.getContext('2d', {willReadFrequently: true});

					cameraPreview.classList.add('active');
					cameraStatus.textContent = 'Camera active — streaming to game...';
					cameraBtn.textContent = '\u25cf Camera ON';
					cameraBtn.style.color = '#00ff41';
					cameraBtn.style.borderColor = '#00ff41';
					log('camera active, streaming at 3fps');

					// Notify server camera is ready
					if (globalWs && globalWs.readyState === 1) {
						globalWs.send(JSON.stringify({type: 'camera_ready'}));
					}

					// Capture at ~3 fps
					cameraInterval = setInterval(captureAndSend, 333);
				} catch (err) {
					cameraStatus.textContent = 'Camera error: ' + err.message;
					cameraBtn.disabled = false;
					log('camera error: ' + err.message);
				}
			}

			cameraBtn.addEventListener('click', enableCamera);
		</script>
	</body>
</html>
